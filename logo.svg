<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3CE1"/>
      <stop offset="100%" style="stop-color:#4A1FB8"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#A78BFA" stroke-width="3" opacity="0.4"/>
  <!-- Arcane symbol - hexagon -->
  <polygon points="256,80 403,148 403,284 256,352 109,284 109,148" fill="none" stroke="url(#glow)" stroke-width="4" opacity="0.6"/>
  <!-- Inner hexagon -->
  <polygon points="256,130 358,170 358,260 256,300 154,260 154,170" fill="none" stroke="#C4B5FD" stroke-width="2" opacity="0.4"/>
  <!-- WhatsApp phone icon stylized -->
  <g transform="translate(256,230) scale(1.1)">
    <!-- Phone body -->
    <path d="M0,-70 C38,-70 70,-38 70,0 C70,38 38,70 0,70 C-38,70 -70,38 -70,0 C-70,-38 -38,-70 0,-70Z" fill="none" stroke="white" stroke-width="5"/>
    <!-- Chat bubble -->
    <path d="M-30,-25 L30,-25 C35,-25 38,-22 38,-17 L38,10 C38,15 35,18 30,18 L5,18 L-10,35 L-10,18 L-30,18 C-35,18 -38,15 -38,10 L-38,-17 C-38,-22 -35,-25 -30,-25Z" fill="white" opacity="0.95"/>
    <!-- Signal waves -->
    <path d="M48,-48 C65,-31 65,31 48,48" fill="none" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round"/>
    <path d="M60,-60 C82,-37 82,37 60,60" fill="none" stroke="#C4B5FD" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    <!-- Lock icon inside bubble (arcanum = secret) -->
    <rect x="-8" y="-8" width="16" height="14" rx="2" fill="#6C3CE1"/>
    <path d="M-5,-8 L-5,-14 C-5,-19 5,-19 5,-14 L5,-8" fill="none" stroke="#6C3CE1" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="0" cy="-1" r="2" fill="white"/>
  </g>
  <!-- Stars / sparkles -->
  <circle cx="130" cy="100" r="3" fill="#C4B5FD" opacity="0.8"/>
  <circle cx="390" cy="120" r="2" fill="#A78BFA" opacity="0.6"/>
  <circle cx="110" cy="350" r="2.5" fill="#C4B5FD" opacity="0.7"/>
  <circle cx="400" cy="380" r="3" fill="#A78BFA" opacity="0.5"/>
  <!-- Text arc -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" letter-spacing="6">ARCANUM</text>
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#C4B5FD" letter-spacing="4">API</text>
</svg>
